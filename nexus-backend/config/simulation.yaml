# 模拟引擎配置
tick_interval_sec: 1.0
heading_drift_max_deg: 5.0
speed_drift_pct: 0.02

# 地图限制区域（与前端 MOCK_ZONES 保持同步）
zones:
  - id: "ZON-001"
    name: "禁飞区 Alpha"
    type: "no-fly"
    coordinates:   # [lng, lat] 格式，与前端一致
      - [-2.60, 51.10]
      - [-2.30, 51.10]
      - [-2.30, 51.25]
      - [-2.60, 51.25]
      - [-2.60, 51.10]

  - id: "ZON-002"
    name: "演习区 Bravo"
    type: "exercise"
    coordinates:
      - [-1.95, 51.35]
      - [-1.70, 51.35]
      - [-1.70, 51.50]
      - [-1.95, 51.50]
      - [-1.95, 51.35]

  - id: "ZON-003"
    name: "警告区 Charlie"
    type: "warning"
    coordinates:
      - [-2.80, 50.55]
      - [-2.40, 50.55]
      - [-2.35, 50.70]
      - [-2.75, 50.75]
      - [-2.80, 50.55]

